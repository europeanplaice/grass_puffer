<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

    <link rel="apple-touch-icon" href="%BASE_URL%icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Linger is a private diary app that stores entries in your Google Drive." />
    <meta name="theme-color" content="#2c3e50" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Linger" />
    <title>Linger</title>
    <meta name="referrer" content="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>(function(){var serifUrl='https://fonts.googleapis.com/css2?family=Noto+Serif:wght@100..900&family=Noto+Serif+JP:wght@200..900&display=swap';var sansUrl='https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100..900&family=Noto+Sans+JP:wght@100..900&display=swap';window.__fontUrls={serif:serifUrl,sans:sansUrl};var f='';try{f=localStorage.getItem('linger_font')||'';}catch(e){}if(f==='sans')document.documentElement.setAttribute('data-font','sans');var l=document.createElement('link');l.rel='stylesheet';l.href=f==='sans'?sansUrl:serifUrl;l.media='print';l.onload=function(){this.media='all';};document.head.appendChild(l);})();</script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <style>
        .ns{max-width:560px;margin:60px auto;padding:0 1.5rem;font-family:'Helvetica Neue',Arial,sans-serif;color:#2c3e50;line-height:1.7}
        .ns h1{font-size:1.8rem;margin-bottom:.3rem}
        .ns p,.ns li{font-size:.95rem;color:#555}
        .ns ul{padding-left:1.4rem}
        .ns a{color:#5a7a5a}
        .ns .links{margin-top:1.5rem;font-size:.85rem}
      </style>
      <div class="ns">
        <h1>Linger</h1>
        <p>Your private diary, stored in your own Google Drive.</p>
        <ul>
          <li>Write and read diary entries from any device</li>
          <li>Entries are stored as files in your Google Drive — you own your data</li>
          <li>Only accesses files created by this app (<code>drive.file</code> scope) — no access to other Drive files</li>
          <li>Sign in with your existing Google account — no separate account needed</li>
        </ul>
        <p class="links">
          <a href="/privacy.html">Privacy Policy</a> ·
          <a href="/terms-of-service.html">Terms of Service</a>
        </p>
        <p><em>JavaScript is required to use this app.</em></p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
